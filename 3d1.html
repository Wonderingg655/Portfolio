<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="slidestyle.css">
    <title>Document</title>
</head>

<body>

    <div class="slideshow-container sepstyle">

        <!-- Full-width images with number and caption text -->
        <div class="mySlides fade">
            <div class="imgborder">
                <div class="prev" onclick="plusSlides(-1)">&#10094;</div>
                <img src="3d1_1.png" class="imgitem">
                <div class="next" onclick="plusSlides(1)">&#10095;</div>
            </div>
        </div>

        <div class="mySlides fade">
            <div class="imgborder">
                <div class="prev" onclick="plusSlides(-1)">&#10094;</div>
                <img src="3d1_2.jpg" class="imgitem">
                <div class="next" onclick="plusSlides(1)">&#10095;</div>
            </div>
        </div>

        <div class="mySlides fade">
            <div class="imgborder">
                <div class="prev" onclick="plusSlides(-1)">&#10094;</div>
                <img src="3d1_3.jpg" class="imgitem">
                <div class="next" onclick="plusSlides(1)">&#10095;</div>
            </div>
        </div>

        <!-- Next and previous buttons -->

        <!-- The dots/circles -->
        <div class="dotcontainer">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>

        <div class="sepinfo">
            <div class="timeline-skills">
                <span class="timeline-skill">Blender</span>
                <span class="timeline-skill">Substance 3D Painter</span>
                <span class="timeline-skill">Adobe Photoshop</span>
            </div>
        </div>
    </div>



</body>

</html>

<script src="slider.js"></script>
